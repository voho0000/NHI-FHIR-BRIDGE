name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. v0.2.1). Created if missing."
        required: true

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build extension
        run: npm run build --workspace extension

      - name: Set version + tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=${{ github.event.inputs.tag }}
          fi
          VER=${TAG#v}
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Zip extension/dist
        run: |
          cd extension
          zip -r ../nhi-fhir-bridge-extension-${{ steps.ver.outputs.tag }}.zip dist
          cd ..
          ls -la *.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: NHI-FHIR-Bridge ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: nhi-fhir-bridge-extension-${{ steps.ver.outputs.tag }}.zip
          body: |
            ## 🚀 快速開始

            ### 🟢 純 Extension（本地模式，不需後端）

            1. 在下方下載 `nhi-fhir-bridge-extension-${{ steps.ver.outputs.tag }}.zip`。
            2. 解壓到任意位置（例如 `~/nhi-fhir-bridge/`）。
            3. Chrome 網址列輸入 `chrome://extensions/` → 右上角開啟「**開發人員模式**」→ 左上角點「**載入未封裝項目**」→ 選擇剛解壓出來的 **`dist/` 資料夾**。
            4. 開健康存摺登入 → 點工具列 🏥 圖示 → 填身分證字號 → 按「**📥 同步健保存摺資料**」→ 跑完後按「**📥 下載 FHIR Bundle**」把檔案存到電腦。

            ### 🔵 Extension + Backend（含 Dashboard / SMART App）

            需要 [Docker Desktop](https://docs.docker.com/get-docker/)。

            ```sh
            git clone https://github.com/${{ github.repository }}.git
            cd $(basename ${{ github.repository }})
            docker compose up -d
            ```

            然後 Extension popup 上方「輸出方式」切到「**上傳後端**」即可。
            Dashboard 在 http://localhost:3010 ，可以多病人瀏覽 + 一鍵 launch SMART app。

            詳細說明見 [README](https://github.com/${{ github.repository }}#readme)。
