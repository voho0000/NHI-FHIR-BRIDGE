name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. v0.2.1). Created if missing."
        required: true

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      # ── Quality gates (mirror backend-ts.yml) — a release must not
      # publish if the same checks that gate main would fail. ─────────
      - name: Type-check (backend)
        working-directory: backend-ts
        run: npx tsc --noEmit

      - name: Test (backend, vitest)
        working-directory: backend-ts
        run: npx vitest run

      - name: Type-check (extension)
        run: npm run typecheck --workspace extension

      - name: Test (extension)
        run: npm run test --workspace extension

      - name: Build extension
        run: npm run build --workspace extension

      - name: Set version + tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=${{ github.event.inputs.tag }}
          fi
          VER=${TAG#v}
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches extension/src/manifest.json version
        run: |
          MANIFEST_VER=$(node -p "require('./extension/src/manifest.json').version")
          TAG_VER="${{ steps.ver.outputs.version }}"
          if [ "$MANIFEST_VER" != "$TAG_VER" ]; then
            echo "::error::Tag v$TAG_VER does not match extension/src/manifest.json version $MANIFEST_VER — bump the manifest (and re-tag) before releasing."
            exit 1
          fi
          echo "tag v$TAG_VER == manifest $MANIFEST_VER ✓"

      - name: Zip extension/dist
        run: |
          cd extension
          zip -r ../nhi-fhir-bridge-extension-${{ steps.ver.outputs.tag }}.zip dist
          cd ..
          ls -la *.zip

      - name: Extract CHANGELOG entry for this version
        # CHANGELOG.md is the authoritative source of release notes. We extract
        # the current version's section into a file and feed it to body_path,
        # which bypasses the YAML parser entirely (the action reads the file
        # at runtime and POSTs straight to the GitHub releases API). This
        # avoids the v0.6.4 / v0.6.6 era YAML-parser breakages we hit when
        # inlining rich-markdown bodies via `body: |` — see git history of
        # this file for the gory details.
        #
        # CHANGELOG.md format expected: each release section starts with a
        # heading like "## X.Y.Z 重點 — YYYY-MM-DD". Awk captures from the
        # matching heading until the next "## X.Y.Z" heading, then trims any
        # trailing "---" separators and blank lines. If no entry is found,
        # the release FAILS — CHANGELOG.md is the authoritative release-notes
        # source, so a tag without an entry must not publish (the old
        # pointer-body fallback let undocumented releases slip through).
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          awk -v ver="$VERSION" '
            /^## [0-9]+\.[0-9]+\.[0-9]+ / {
              if ($2 == ver) { capture=1; lines[++n] = $0; next }
              if (capture) { capture=0; next }
            }
            capture { lines[++n] = $0 }
            END {
              while (n > 0 && (lines[n] ~ /^[[:space:]]*$/ || lines[n] == "---")) n--
              for (i=1; i<=n; i++) print lines[i]
            }
          ' CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG.md entry found for v$VERSION. Add a \"## $VERSION 重點 — YYYY-MM-DD\" section to CHANGELOG.md before tagging — releases without curated notes are not allowed."
            exit 1
          fi

          echo "---- release notes preview ($(wc -l < /tmp/release-notes.md) lines) ----"
          head -40 /tmp/release-notes.md
          echo "---- (end preview) ----"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: NHI-FHIR-Bridge ${{ steps.ver.outputs.tag }}
          # generate_release_notes intentionally OFF: CHANGELOG.md entries are
          # curated and the auto-generated commit list just duplicates the
          # commit subjects we already wrote there.
          files: nhi-fhir-bridge-extension-${{ steps.ver.outputs.tag }}.zip
          body_path: /tmp/release-notes.md
