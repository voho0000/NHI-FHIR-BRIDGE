name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff>=0.5.0

      - name: Run ruff check
        working-directory: backend
        run: ruff check app tests

      - name: Run ruff format check
        working-directory: backend
        run: ruff format --check app tests

  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install mypy>=1.10.0

      - name: Run mypy
        working-directory: backend
        # `|| true` while the codebase still has untyped corners — gives
        # contributors a heads-up without blocking merges. Tighten when
        # the typing debt is paid down.
        run: mypy app --ignore-missing-imports || true
