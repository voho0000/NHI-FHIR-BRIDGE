name: backend-ts + extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: PHI guard — no checksum-valid TWID in tracked files
        run: node scripts/check-no-real-twid.mjs

      - name: Install (workspaces)
        run: npm ci

      - name: Type-check (backend)
        working-directory: backend-ts
        run: npx tsc --noEmit

      - name: Lint (biome)
        working-directory: backend-ts
        run: npx biome check src tests

      - name: Test (vitest)
        working-directory: backend-ts
        run: npx vitest run

      - name: Apply migrations
        working-directory: backend-ts
        env:
          DATABASE_FILE: /tmp/ci.db
        run: npx tsx src/core/migrate.ts

      - name: Type-check (extension)
        run: npm run typecheck --workspace extension

      - name: Lint (extension, biome)
        run: npm run lint --workspace extension

      - name: Test (extension adapters via vitest)
        run: npm run test --workspace extension

      - name: Build extension
        run: npm run build --workspace extension

      - name: Verify extension/dist artefacts
        run: |
          test -f extension/dist/manifest.json
          test -f extension/dist/background.js
          test -f extension/dist/popup.html
          test -f extension/dist/popup.js
          # background.js must contain bundled mapper symbols
          grep -q "linkEncountersInResources" extension/dist/background.js

      - name: Verify committed extension/dist matches src (no drift)
        run: git diff --exit-code extension/dist

  # frontend/ is NOT an npm workspace (own lockfile), so it gets its own job.
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (frontend)
        working-directory: frontend
        run: npm ci

      - name: Type-check (frontend)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build (frontend)
        working-directory: frontend
        run: npm run build
