<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- FHIR 標準橘紅漸層 -->
    <linearGradient id="fhirOrangeRed" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F15A24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4136;stop-opacity:1" />
    </linearGradient>
    
    <!-- 火焰核心亮色漸層 -->
    <linearGradient id="fireCore" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FBB040;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFD400;stop-opacity:0.6" />
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 外圈：健保署的藍色圓環 -->
  <path d="M 256,40 A 216,216 0 1,0 256,472 A 216,216 0 0,0 420,120" 
        fill="none" stroke="#0072BC" stroke-width="35" stroke-linecap="round" />

  <!-- 核心融合圖形 -->
  <!-- 左側人像半邊 (保持健保綠) -->
  <path d="M 180,220 L 180,380" stroke="#009B4D" stroke-width="45" stroke-linecap="round" />
  <circle cx="180" cy="160" r="35" fill="#009B4D" />

  <!-- 右側火焰：優化為更具燃燒感的形狀 (多尖端、動態曲線) -->
  <path d="M 332,380 
           C 332,380 430,340 430,240 
           C 430,140 380,80 340,40 
           C 340,40 360,100 340,160 
           C 320,220 256,40 256,40 
           C 256,40 300,150 280,240 
           C 260,330 332,380 332,380 Z" 
        fill="url(#fhirOrangeRed)" filter="url(#softShadow)" />
  
  <!-- 火焰內部的亮色核心：增加層次感，強化火焰特徵 -->
  <path d="M 310,340 
           C 310,340 370,310 370,240 
           C 370,180 340,140 320,110 
           C 320,110 330,150 320,190 
           C 310,230 270,120 270,120 
           C 270,120 290,180 280,240 
           C 270,300 310,340 310,340 Z" 
        fill="url(#fireCore)" />

  <!-- 中間連接橫槓 (保持健保綠) -->
  <path d="M 180,280 L 300,280" stroke="#009B4D" stroke-width="35" stroke-linecap="round" opacity="0.8" />
  
  <!-- 存摺元素 (保持健保藍) -->
  <rect x="160" y="400" width="192" height="15" rx="7" fill="#0072BC" />
  <rect x="190" y="430" width="132" height="10" rx="5" fill="#0072BC" opacity="0.6" />

</svg>
