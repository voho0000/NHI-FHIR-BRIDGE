<svg width="128" height="128" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: deep teal — closer to NHI's medical-portal palette
       than my earlier dark navy, while still high-contrast at 16 px. -->
  <rect width="32" height="32" rx="5" fill="#0e7490"/>

  <!-- Passbook as a thin "base" strip at the bottom — establishes the
       存摺 context without competing with the flame visually. Now
       smaller (was 14 tall) so the flame has room to dominate. -->
  <g>
    <rect x="5" y="24" width="22" height="6" rx="1.2" fill="#ffffff"/>
    <rect x="5" y="24" width="3" height="6" fill="#0891b2"/>
    <line x1="10" y1="27" x2="25" y2="27" stroke="#cbd5e1" stroke-width="0.9" stroke-linecap="round"/>
  </g>

  <!-- Flame — HL7 FHIR's motif. Scaled up so it now occupies roughly
       the top 75% of the canvas (was ~50%). The bottom edge slightly
       overlaps the passbook so it reads as fire emerging from the
       passbook. -->
  <path d="M16 1
           C 22 4 27 9 25 16
           C 23 19 19 19 20 16
           C 21 13 19 11 16 9
           C 12 12 7 16 9 21
           C 10 24 14 24.5 16 24.5
           C 19 24.5 25 23 25 17
           C 25 11 21 6 16 1 Z"
        fill="#f59e0b"
        stroke="#ffffff"
        stroke-width="0.7"
        stroke-linejoin="round"/>
</svg>
