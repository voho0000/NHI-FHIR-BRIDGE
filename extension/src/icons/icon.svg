<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background — medical blue, matches popup CTA palette. -->
  <rect width="128" height="128" rx="22" fill="#1e3a8a"/>
  <!-- White medical cross — instantly recognisable at 16px. -->
  <rect x="54" y="24" width="20" height="80" rx="3" fill="#ffffff"/>
  <rect x="24" y="54" width="80" height="20" rx="3" fill="#ffffff"/>
  <!-- Subtle FHIR tag at the bottom — visible at 32px+. -->
  <text x="64" y="118" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', sans-serif"
        font-size="14" font-weight="700" fill="#bfdbfe"
        letter-spacing="1">FHIR</text>
</svg>
