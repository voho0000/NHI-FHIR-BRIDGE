<svg width="128" height="128" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: deep teal — closer to NHI's medical-portal palette
       than my earlier dark navy, while still high-contrast at 16 px. -->
  <rect width="32" height="32" rx="5" fill="#0e7490"/>

  <!-- Passbook (closed booklet, slight depth via the darker spine on
       the left edge). The 3 horizontal lines mark it as a 存摺/ledger.
       Sits in the lower 2/3 of the canvas so the flame above reads as
       "emerging from / powered by" the passbook. -->
  <g>
    <rect x="6" y="13" width="20" height="15" rx="1.5" fill="#ffffff"/>
    <rect x="6" y="13" width="3" height="15" fill="#0891b2"/>
    <line x1="11" y1="18" x2="24" y2="18" stroke="#cbd5e1" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="11" y1="21" x2="24" y2="21" stroke="#cbd5e1" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="11" y1="24" x2="20" y2="24" stroke="#cbd5e1" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Flame — HL7 FHIR's logo motif. Hand-traced teardrop with an
       inner curl so it reads as fire (not just a balloon) even at
       16 px. Slight overlap with the booklet top edge so it looks
       like the passbook is being "powered by" FHIR. -->
  <path d="M16 2
           C 20 5 22 8 20 12
           C 18.8 14 16.8 14 17.4 12
           C 18 10.5 16.8 9.5 16 8.5
           C 13.5 11 11.5 13 12.6 15.5
           C 13.4 17 15 17 16 17
           C 18 17 21 16 21 12.5
           C 21 9 18.5 5 16 2 Z"
        fill="#f59e0b"
        stroke="#ffffff"
        stroke-width="0.5"
        stroke-linejoin="round"/>
</svg>
