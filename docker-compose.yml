version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      # Loopback-only: backend stores PHI (the FHIR resources extracted
      # from captures) and currently has no auth on /sync/upload-html.
      # Binding to 127.0.0.1 means external network can't reach it; the
      # only callers are the user's own browser (extension, dashboard,
      # SMART app via launch token).
      - "127.0.0.1:8010:8010"
    env_file: .env
    environment:
      # When LLM_PROVIDER=ollama, backend reaches Ollama running on the Docker
      # host. host.docker.internal works out of the box on Mac/Windows; on Linux
      # the extra_hosts entry below maps it to the host gateway.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      # Mount source so backend code changes are live without rebuilding.
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      # Loopback-only — same reasoning as backend.
      # Host port 3010 to leave 3000 free for the medical-note SMART app
      # (`npm run dev` defaults to 3000). Container-internal port stays 3000
      # so Next.js doesn't need to be reconfigured.
      - "127.0.0.1:3010:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8010
    depends_on:
      - backend
