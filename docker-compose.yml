# NHI-FHIR-Bridge — backend + dashboard.
#
# Only needed for the extension's "上傳後端" mode (dashboard, SMART app
# launches, multi-user FHIR store). The "下載到電腦" mode runs entirely
# inside the Chrome extension and needs none of this.
#
# Usage:
#   docker compose up -d         # start in background
#   docker compose logs -f       # follow logs
#   docker compose down          # stop

services:
  backend:
    build:
      # Build context = repo root so the workspaces package
      # (packages/mapper) is reachable from the Dockerfile.
      context: .
      dockerfile: backend-ts/Dockerfile
    ports:
      # Loopback-only: backend stores PHI. Binding to 127.0.0.1 means
      # external network can't reach it; the only callers are the user's
      # own browser (extension, dashboard, SMART app via launch token).
      - "127.0.0.1:8010:8010"
    env_file: .env
    environment:
      DATABASE_FILE: /app/data/ehr_bridge.db
      # Inside the container we MUST bind 0.0.0.0 so the host-side
      # `127.0.0.1:8010:8010` port mapping can reach us. The loopback
      # bind that protects PHI lives in the port mapping above, NOT
      # inside the container.
      BIND_HOST: 0.0.0.0
    volumes:
      # Named volume for the SQLite DB — on macOS Docker, bind-mounting
      # the host's "data/" folder makes every fsync go through gRPC FUSE
      # (~4s per commit on Google Drive paths). Named volume lives in
      # Docker's overlay2 fs and is ~100x faster.
      # Inspect / export DB: `docker compose exec backend sqlite3 /app/data/ehr_bridge.db`
      # or `curl http://localhost:8010/fhir/export > bundle.json`.
      - ehr_data:/app/data
      # Live-mount source so code changes don't need a rebuild.
      # Paths reflect the in-container layout established by the Dockerfile
      # (WORKDIR ends at /app/backend-ts; shared mapper lives next door).
      - ./backend-ts/src:/app/backend-ts/src
      - ./backend-ts/drizzle:/app/backend-ts/drizzle
      - ./packages/mapper/src:/app/packages/mapper/src

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      # Public backend URL — exposed to the browser via NEXT_PUBLIC_*.
      # Used by the SMART on FHIR launch flow (iss, /smart/authorize).
      NEXT_PUBLIC_API_URL: http://localhost:8010
      # Internal backend URL — server-side only. Used by the dashboard's
      # /api/backend/[...path] proxy to forward PHI calls with the API key.
      BACKEND_INTERNAL_URL: http://backend:8010
      # SYNC_API_KEY is read server-side ONLY by the proxy route handler.
      # NEVER prefix with NEXT_PUBLIC_ — that would inline it into the
      # browser bundle and leak it to anyone with DevTools.
      SYNC_API_KEY: ${SYNC_API_KEY:-}
    depends_on:
      - backend

volumes:
  ehr_data:
